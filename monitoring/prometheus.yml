global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/prometheus.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:

  # C# ASP.NET Core API — /metrics endpoint (prometheus-net)
  - job_name: 'kargoguard-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: '/metrics'

  # RabbitMQ — prometheus plugin (port 15692)
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: '/metrics'

  # PostgreSQL — postgres-exporter aracısı
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Prometheus kendini de izlesin
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
