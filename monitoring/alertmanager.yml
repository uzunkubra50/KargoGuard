global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver: 'null'

  # Kritik alertler ayrı rota ile daha sık tekrarlanır
  routes:
    - match:
        severity: critical
      receiver: 'null'
      repeat_interval: 1h

receivers:
  # Varsayılan: alertler yutulur — Alertmanager UI'da (http://localhost:9093) görünür
  - name: 'null'

  # Slack entegrasyonu: .env'de SLACK_WEBHOOK_URL tanımlanıp bu bloğu aktif et,
  # 'null' yerine 'slack' receiver'ını kullan
  #
  # - name: 'slack'
  #   slack_configs:
  #     - api_url: '${SLACK_WEBHOOK_URL}'
  #       channel: '#kargoguard-alerts'
  #       send_resolved: true
  #       title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
  #       text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

inhibit_rules:
  # Servis down olduğunda alt alertleri sustur (hata oranı vb.)
  - source_match:
      alertname: KargoGuardAPIDown
    target_match_re:
      alertname: HighAPIErrorRate|HighAPILatency
    equal: ['job']
