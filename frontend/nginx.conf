server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # Gzip — bant genişliğini azalt
    gzip            on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript
                    image/svg+xml;

    # React Router — SPA desteği (doğrudan URL girişi çalışsın)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API isteklerini C# backend konteynerine yönlendir
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # Fotoğraf yükleme için uzatıldı
        proxy_send_timeout 300s;
        client_max_body_size 10m;  # 8 MB dosya limiti + buffer
    }

    # Statik varlıklar — tarayıcı önbelleği 1 yıl
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
