name: CD – Docker Build & Push

# Sadece main branch'e push yapıldığında çalışır.
# Docker imajlarını GitHub Container Registry'ye (ghcr.io) gönderir.
# Gerekli secret: GITHUB_TOKEN (GitHub otomatik sağlar — ek ayar gerekmez).

on:
  push:
    branches: [main]

jobs:
  docker:
    name: "Docker İmajları Oluştur & Gönder"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # ghcr.io'ya push için

    steps:
      - uses: actions/checkout@v4

      # ── Docker altyapısı ────────────────────────────────────
      - name: Docker Buildx kur
        uses: docker/setup-buildx-action@v3

      - name: GitHub Container Registry'ye giriş yap
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Kullanıcı adını küçük harfe çevir (Docker image zorunluluğu)
      - name: Image prefix belirle
        run: |
          echo "IMG=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # ── C# API ──────────────────────────────────────────────
      - name: "API imajı: build & push"
        uses: docker/build-push-action@v5
        with:
          context: ./backend/KargoGuard.API
          push: true
          tags: |
            ${{ env.IMG }}/kargoguard-api:latest
            ${{ env.IMG }}/kargoguard-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max

      # ── Python AI Worker ─────────────────────────────────────
      - name: "AI Worker imajı: build & push"
        uses: docker/build-push-action@v5
        with:
          context: ./backend/KargoGuard.AI
          push: true
          tags: |
            ${{ env.IMG }}/kargoguard-ai-worker:latest
            ${{ env.IMG }}/kargoguard-ai-worker:${{ github.sha }}
          cache-from: type=gha,scope=ai-worker
          cache-to:   type=gha,scope=ai-worker,mode=max

      # ── React Frontend ───────────────────────────────────────
      - name: "Frontend imajı: build & push"
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMG }}/kargoguard-frontend:latest
            ${{ env.IMG }}/kargoguard-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      # ── Özet ─────────────────────────────────────────────────
      - name: Gönderilen imajları yazdır
        run: |
          echo "✅ İmajlar ghcr.io'da hazır:"
          echo "   ${{ env.IMG }}/kargoguard-api:${{ github.sha }}"
          echo "   ${{ env.IMG }}/kargoguard-ai-worker:${{ github.sha }}"
          echo "   ${{ env.IMG }}/kargoguard-frontend:${{ github.sha }}"
