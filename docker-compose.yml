version: '3.8'

# KargoGuard – Tam Mikroservis Orkestrasyon Yapılandırması
# Kullanım : docker-compose up --build
# Ön koşul : Kök dizinde .env dosyası hazır olmalı  (cp .env.example .env)

services:

  # ─────────────────────────────────────────────────────────────
  # 1. PostgreSQL – İlişkisel Veritabanı
  # ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: kargoguard-postgres
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 2. RabbitMQ – Mesaj Kuyruğu  (Yönetim UI: http://localhost:15672)
  # ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: kargoguard-rabbitmq
    ports:
      - "5672:5672"    # AMQP – C# API ve Python Worker bu porttan konuşur
      - "15672:15672"  # Web UI
      - "15692:15692"  # Prometheus metrics
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - ./monitoring/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 3. Redis – Dağıtık Önbellek & Token Blacklist  (port 6379)
  # ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kargoguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 4. MinIO – Görsel Depolama S3 uyumlu  (UI: http://localhost:9001)
  # ─────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: kargoguard-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web UI
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 5. KargoGuard API – C# ASP.NET Core 10  (http://localhost:5229)
  # ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend/KargoGuard.API
      dockerfile: Dockerfile
    container_name: kargoguard-api
    ports:
      - "5229:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS:  "8080"
      # Veritabanı
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      # MinIO
      MinIO__Endpoint:   minio:9000
      MinIO__AccessKey:  ${MINIO_ACCESS_KEY}
      MinIO__SecretKey:  ${MINIO_SECRET_KEY}
      MinIO__BucketName: ${MINIO_BUCKET}
      MinIO__WithSSL:    "false"
      # RabbitMQ
      RabbitMQ__Host:     rabbitmq
      RabbitMQ__Port:     "5672"
      RabbitMQ__Username: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      # Blockchain
      Blockchain__AlchemyUrl:      ${BLOCKCHAIN_ALCHEMY_URL}
      Blockchain__PrivateKey:      ${BLOCKCHAIN_PRIVATE_KEY}
      Blockchain__ContractAddress: ${BLOCKCHAIN_CONTRACT_ADDRESS}
      # Gemini AI
      Gemini__ApiKey: ${GEMINI_API_KEY}
      Gemini__Model:  ${GEMINI_MODEL}
      # JWT
      Jwt__Key:            ${JWT_KEY}
      Jwt__Issuer:         KargoGuard
      Jwt__Audience:       KargoGuardClient
      Jwt__ExpiresInHours: "8"
      # Redis
      Redis__ConnectionString: "redis:6379,abortConnect=false"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 6. AI Worker – Python YOLO + Gemini Vision
  # ─────────────────────────────────────────────────────────────
  ai-worker:
    build:
      context: ./backend/KargoGuard.AI
      dockerfile: Dockerfile
    container_name: kargoguard-ai-worker
    environment:
      # RabbitMQ
      RABBITMQ_HOST:     rabbitmq
      RABBITMQ_PORT:     "5672"
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      # PostgreSQL
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_USER:     ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME:     ${DB_NAME}
      # MinIO
      MINIO_ENDPOINT:   minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET:     ${MINIO_BUCKET}
      # AI
      GEMINI_API_KEY:   ${GEMINI_API_KEY}
      GEMINI_MODEL:     ${GEMINI_MODEL}
      ROBOFLOW_API_KEY: ${ROBOFLOW_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 7. Frontend – React + Vite → Nginx  (http://localhost:3000)
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""   # Boş = Nginx proxy kullan; doğrudan: http://localhost:5229
    container_name: kargoguard-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 8. Prometheus – Metrik Toplama  (http://localhost:9090)
  # ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: kargoguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - alertmanager
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 9. Alertmanager – Alarm Yönetimi  (http://localhost:9093)
  # ─────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: kargoguard-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 10. Loki – Log Depolama  (http://localhost:3100)
  # ─────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.8
    container_name: kargoguard-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 11. Promtail – Log Toplayıcı (Docker container loglarını Loki'ye iletir)
  # ─────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.8
    container_name: kargoguard-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 12. Grafana – Görsel Dashboard  (http://localhost:3001)
  #     Giriş: admin / .env'deki GRAFANA_PASSWORD (varsayılan: kargoguard)
  # ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: kargoguard-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-kargoguard}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────
  # 13. PostgreSQL Exporter – DB metriklerini Prometheus'a taşır
  # ─────────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: kargoguard-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ─────────────────────────────────────────────────────────────
# Kalıcı Veri Hacimleri
# ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  minio_data:
  redis_data:
  prometheus_data:
  grafana_data:
  loki_data:
